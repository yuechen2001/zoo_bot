name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r zoo_cli/requirements.txt

      - name: Lint (ruff)
        run: ruff check zoo_cli/

      - name: Format check (black)
        run: black --check zoo_cli/

      - name: Tests
        run: cd zoo_cli && pytest --cov=game --cov=species_data --cov-report=term-missing

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zoo_bot
            git fetch origin main
            git reset --hard origin/main
            ./venv/bin/pip install -r zoo_cli/requirements.txt --quiet
            # Inject any keys present in .env.example but missing from .env
            while IFS='=' read -r key value; do
              [[ -z "$key" || "$key" == \#* ]] && continue
              grep -q "^${key}=" zoo_cli/.env || echo "${key}=${value}" >> zoo_cli/.env
            done < zoo_cli/.env.example
            ./venv/bin/python zoo_cli/migrate.py up
            sudo systemctl restart zoobot
            sleep 2
            sudo systemctl is-active --quiet zoobot && echo "Bot restarted successfully" || (echo "Bot failed to start" && sudo journalctl -u zoobot -n 20 && exit 1)
